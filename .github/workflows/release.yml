name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Resolve tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ]; then
            echo "::error::Missing tag name"
            exit 1
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?([.-][0-9A-Za-z]+)*$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            echo "Expected format: v1.0, v1.0.0, or v1.0.0-beta1"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Show changelog preview
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" "$PREV_TAG..${GITHUB_REF_NAME}"
          else
            git log --pretty=format:"- %s (%h)" | head -20
          fi

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 60
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-llvm-openmp
            mingw-w64-x86_64-mimalloc
            make

      # LTO + PGO two-pass build (scripts/build-pgo.sh). Restores the ~20% the
      # released binaries left on the table (CI previously shipped -DDISABLE_LTO=ON
      # and no PGO). LTO links cleanly under clang+lld; the old static-link reason
      # for DISABLE_LTO no longer applies (release links dynamic / copies DLLs).
      - name: Build (LTO + PGO)
        shell: msys2 {0}
        run: |
          export CMAKE_ARGS="-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DDIRTYBIRD_VERSION=${{ needs.verify.outputs.version }}"
          export TRAIN_SECS=60
          bash scripts/build-pgo.sh

      # Gate the release on hash correctness: LTO+PGO is aggressive enough to
      # miscompile the hand-written hot path, and a fast WRONG hash is worse than
      # a slow right one. --selftest computes pow("a") and exits 1 on mismatch.
      - name: Self-test (pow KAT) + smoke
        shell: msys2 {0}
        run: |
          ./build/bin/dirtybird-miner-cpu.exe --selftest
          ./build/bin/dirtybird-miner-cpu.exe --help > /dev/null

      - name: Package
        shell: pwsh
        run: ./scripts/release.ps1 -Version ${{ needs.verify.outputs.tag }} -BuildDir build -OutputDir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*.zip

  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm cmake ninja-build lld patchelf \
            libboost-all-dev libssl-dev libomp-dev \
            libnuma-dev libudns-dev libmimalloc-dev

      # LTO + PGO two-pass build (see scripts/build-pgo.sh). Same code+SIMD as the
      # Windows build; with matched flags this restores Linux/AMD to Windows-class
      # hashrate (CI previously shipped -DDISABLE_LTO=ON and no PGO, ~20% slower).
      - name: Build (LTO + PGO)
        run: |
          export CMAKE_ARGS="-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DDIRTYBIRD_VERSION=${{ needs.verify.outputs.version }}"
          export TRAIN_SECS=60
          bash scripts/build-pgo.sh

      # Gate on hash correctness (LTO+PGO is new to this path; a fast wrong hash
      # is worse than a slow right one). --selftest exits 1 on pow("a") mismatch.
      - name: Self-test (pow KAT) + smoke
        run: |
          ./build/bin/dirtybird-miner-cpu --selftest
          ./build/bin/dirtybird-miner-cpu --help > /dev/null

      - name: Package
        run: bash ./scripts/release.sh "${{ needs.verify.outputs.tag }}" build dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*.tar.gz

  build-hiveos:
    name: Build HiveOS/MMPOS Package
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm cmake ninja-build lld patchelf libssl-dev

      # LTO + PGO two-pass build (see scripts/build-pgo.sh). HiveOS/MMPOS rigs are
      # x86_64 -- identical code+SIMD to Windows, so matched flags = matched hashrate.
      - name: Build (LTO + PGO)
        run: |
          export CMAKE_ARGS="-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DDIRTYBIRD_VERSION=${{ needs.verify.outputs.version }}"
          export TRAIN_SECS=60
          bash scripts/build-pgo.sh

      # Gate on hash correctness (LTO+PGO is new to this path; a fast wrong hash
      # is worse than a slow right one). --selftest exits 1 on pow("a") mismatch.
      - name: Self-test (pow KAT) + smoke
        run: |
          ./build/bin/dirtybird-miner-cpu --selftest
          ./build/bin/dirtybird-miner-cpu --help > /dev/null

      - name: Package (HiveOS/MMPOS)
        run: bash ./scripts/release-hiveos.sh "${{ needs.verify.outputs.tag }}" build dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-hiveos
          path: dist/*.tar.gz

  build-android:
    name: Build Android (aarch64) Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # binfmt so the static aarch64 PGO trainer runs on the x86 runner.
      - name: Set up QEMU (arm64 binfmt)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Cross-build OpenSSL for android-arm64 (static)
        run: |
          set -e
          NDK="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          export ANDROID_NDK_ROOT="$NDK"
          export PATH="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          git clone --depth 1 https://github.com/openssl/openssl ossl-src
          cd ossl-src
          ./Configure android-arm64 -D__ANDROID_API__=24 no-shared no-tests no-docs \
            --prefix="$GITHUB_WORKSPACE/ossl-android"
          make -j"$(nproc)" build_libs
          make install_dev

      # Full LTO + PGO for Android, via a NATIVE aarch64 profile (same arch + same
      # clang-18 as the NDK -> the hot path matches cleanly; verified locally: 1
      # profile-mismatch warning vs 15 for an x86 profile). build-pgo.sh builds a
      # static instrumented trainer (GEN_CMAKE_ARGS=-static) that runs under QEMU
      # binfmt to collect the profile, then builds the normal dynamic release miner
      # with -fprofile-use. Android is silicon-bound (a phone won't match a desktop
      # CPU) but now ships with the same optimization level as every other platform.
      - name: Build (LTO + PGO via NDK + QEMU)
        run: |
          NDK="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          NDKBIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-24 -DANDROID_STL=c++_static -DOPENSSL_ROOT_DIR=$GITHUB_WORKSPACE/ossl-android -DOPENSSL_USE_STATIC_LIBS=TRUE -DCMAKE_FIND_ROOT_PATH=$GITHUB_WORKSPACE/ossl-android -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH -DDIRTYBIRD_VERSION=${{ needs.verify.outputs.version }}"
          export GEN_CMAKE_ARGS="-DCMAKE_EXE_LINKER_FLAGS=-static"
          export PROFDATA="$NDKBIN/llvm-profdata"
          export BUILD_DIR=build-android TRAIN_SECS=40 TRAIN_THREADS=4
          bash scripts/build-pgo.sh

      - name: Verify ELF (aarch64)
        run: |
          NDK="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf" -h \
            build-android/bin/dirtybird-miner-cpu | grep -iE 'Machine|Class'

      - name: Package (Android)
        run: bash ./scripts/release-android.sh "${{ needs.verify.outputs.tag }}" build-android dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: dist/*.tar.gz

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify, build-windows, build-linux, build-hiveos, build-android]
    # Publish as long as the (locally-verified) Windows build succeeded; a Linux
    # build failure attaches Windows-only rather than blocking the whole release.
    if: ${{ !cancelled() && needs.verify.result == 'success' && needs.build-windows.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts

      - name: Download Linux artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: artifacts

      - name: Download HiveOS artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-hiveos
          path: artifacts

      - name: Download Android artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: artifacts

      - name: Build release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## DIRTYBIRD Miner ${{ needs.verify.outputs.tag }}"
            echo
            echo "Assets:"
            echo "- dirtybird-miner-win64-${{ needs.verify.outputs.tag }}.zip"
            echo "- dirtybird-miner-amd64-${{ needs.verify.outputs.tag }}.tar.gz"
            echo "- SHA256SUMS.txt"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              git log --pretty=format:"- %s (%h)" "$PREV_TAG..${GITHUB_REF_NAME}"
            else
              echo "## Initial release"
              git log --pretty=format:"- %s (%h)" | head -20
            fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Generate checksums
        run: |
          cd artifacts
          shopt -s nullglob
          sha256sum *.zip *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: DIRTYBIRD Miner ${{ needs.verify.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(needs.verify.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
