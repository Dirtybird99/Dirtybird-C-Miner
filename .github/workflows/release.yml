name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Resolve tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ]; then
            echo "::error::Missing tag name"
            exit 1
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?([.-][0-9A-Za-z]+)*$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            echo "Expected format: v1.0, v1.0.0, or v1.0.0-beta1"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Show changelog preview
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" "$PREV_TAG..${GITHUB_REF_NAME}"
          else
            git log --pretty=format:"- %s (%h)" | head -20
          fi

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 60
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-openmp
            mingw-w64-x86_64-mimalloc
            make

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDISABLE_LTO=ON \
            -DBUILD_STATIC=ON \
            -DDIRTYBIRD_VERSION=${{ needs.verify.outputs.version }} \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --target dirtybird-miner-cpu --parallel

      - name: Smoke test
        shell: msys2 {0}
        run: ./build/bin/dirtybird-miner-cpu.exe --help > /dev/null

      - name: Package
        shell: pwsh
        run: ./scripts/release.ps1 -Version ${{ needs.verify.outputs.tag }} -BuildDir build -OutputDir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*.zip

  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build lld \
            libboost-all-dev libssl-dev libomp-dev \
            libnuma-dev libudns-dev libmimalloc-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDISABLE_LTO=ON \
            -DBUILD_STATIC=ON \
            -DDIRTYBIRD_VERSION=${{ needs.verify.outputs.version }} \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --target dirtybird-miner-cpu --parallel

      - name: Smoke test
        run: ./build/bin/dirtybird-miner-cpu --help > /dev/null

      - name: Package
        run: bash ./scripts/release.sh "${{ needs.verify.outputs.tag }}" build dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*.tar.gz

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify, build-windows, build-linux]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: artifacts

      - name: Build release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## DIRTYBIRD Miner ${{ needs.verify.outputs.tag }}"
            echo
            echo "Assets:"
            echo "- dirtybird-miner-win64-${{ needs.verify.outputs.tag }}.zip"
            echo "- dirtybird-miner-amd64-${{ needs.verify.outputs.tag }}.tar.gz"
            echo "- SHA256SUMS.txt"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              git log --pretty=format:"- %s (%h)" "$PREV_TAG..${GITHUB_REF_NAME}"
            else
              echo "## Initial release"
              git log --pretty=format:"- %s (%h)" | head -20
            fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.zip *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: DIRTYBIRD Miner ${{ needs.verify.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(needs.verify.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
