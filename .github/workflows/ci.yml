name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-openmp
            make

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -B build -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --config Release -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dirtybird-miner-windows
          path: build/bin/dirtybird-miner-cpu.exe
          retention-days: 7

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    needs: build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dirtybird-miner-windows
          path: ./bin

      - name: Run AstroBWTv3 tests
        shell: pwsh
        run: |
          ./bin/dirtybird-miner-cpu.exe --test-dero
          if ($LASTEXITCODE -ne 0) { exit 1 }

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            libboost-all-dev \
            libssl-dev \
            libomp-dev

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dirtybird-miner-linux
          path: build/bin/dirtybird-miner-cpu
          retention-days: 7

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dirtybird-miner-linux
          path: ./bin

      - name: Run AstroBWTv3 tests
        run: |
          chmod +x ./bin/dirtybird-miner-cpu
          ./bin/dirtybird-miner-cpu --test-dero

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for large files
        run: |
          find . -type f -size +5M -not -path "./.git/*" | head -20 > large_files.txt
          if [ -s large_files.txt ]; then
            echo "::warning::Large files detected:"
            cat large_files.txt
          fi

      - name: Check line endings
        run: |
          # Check for CRLF line endings in source files
          if git ls-files '*.cpp' '*.hpp' '*.h' | xargs grep -l $'\r' 2>/dev/null; then
            echo "::warning::Some files have CRLF line endings"
          fi
