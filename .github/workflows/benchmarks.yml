name: Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  replay-benchmark:
    name: Replay Benchmark (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            summary_name: benchmark-windows
          - name: Linux
            os: ubuntu-latest
            summary_name: benchmark-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-llvm-openmp
            mingw-w64-x86_64-mimalloc
            make

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build lld \
            libboost-all-dev libssl-dev libomp-dev \
            libnuma-dev libudns-dev libmimalloc-dev

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDISABLE_LTO=ON \
            -DBUILD_STATIC=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDISABLE_LTO=ON \
            -DBUILD_STATIC=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build benchmark target (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --target bench-dero-replay --parallel

      - name: Build benchmark target (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --target bench-dero-replay --parallel

      - name: Run replay benchmark (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          ./build/bin/bench-dero-replay.exe \
            --input-file benchmarks/dero_replay_inputs.txt \
            --threads 2 \
            --omp-threads 1 \
            --warmup 2 \
            --duration 10 \
            --lookup-mode hybrid \
            --algo wolf_memopt \
            --json-out benchmark.json 2>&1 | tee benchmark-results.txt

      - name: Run replay benchmark (Linux)
        if: runner.os == 'Linux'
        run: |
          ./build/bin/bench-dero-replay \
            --input-file benchmarks/dero_replay_inputs.txt \
            --threads 2 \
            --omp-threads 1 \
            --warmup 2 \
            --duration 10 \
            --lookup-mode hybrid \
            --algo wolf_memopt \
            --json-out benchmark.json 2>&1 | tee benchmark-results.txt

      - name: Build benchmark summary
        shell: pwsh
        run: |
          $json = Get-Content benchmark.json | ConvertFrom-Json
          @"
          ## Replay Benchmark

          Platform: ${{ matrix.name }}
          Threads: $($json.threads)
          OMP threads: $($json.omp_threads)
          Lookup mode: $($json.lookup_mode)
          Hashes: $($json.hashes)
          Hash rate: $([math]::Round([double]$json.hash_rate_hs, 3)) H/s
          Self-check passed: $($json.self_check_passed)
          "@ | Set-Content benchmark-summary.md
          Get-Content benchmark-summary.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.summary_name }}
          path: |
            benchmark-results.txt
            benchmark-summary.md
            benchmark.json
          retention-days: 30
