name: Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synthetic-benchmark:
    name: Synthetic Benchmark (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            summary_name: benchmark-windows
          - name: Linux
            os: ubuntu-latest
            summary_name: benchmark-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            make

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build lld libssl-dev

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build synthetic trainer (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --target dirtybird-pgo-train --parallel

      - name: Build synthetic trainer (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --target dirtybird-pgo-train --parallel

      # dirtybird-pgo-train hashes synthetic jobs with no daemon and self-exits,
      # so it is a deterministic, network-free throughput check for CI.
      - name: Run synthetic benchmark (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          ./build/bin/dirtybird-pgo-train.exe -t 2 --seconds 10 2>&1 | tee benchmark-results.txt
          grep -Eq 'pgo_train hashes=[1-9][0-9]*' benchmark-results.txt

      - name: Run synthetic benchmark (Linux)
        if: runner.os == 'Linux'
        run: |
          ./build/bin/dirtybird-pgo-train -t 2 --seconds 10 2>&1 | tee benchmark-results.txt
          grep -Eq 'pgo_train hashes=[1-9][0-9]*' benchmark-results.txt

      - name: Build benchmark summary
        shell: bash
        run: |
          HASHES=$(grep -oE 'pgo_train hashes=[0-9]+' benchmark-results.txt | grep -oE '[0-9]+' | tail -1)
          {
            echo "## Synthetic Benchmark"
            echo
            echo "Platform: ${{ matrix.name }}"
            echo "Trainer: dirtybird-pgo-train -t 2 --seconds 10"
            echo "Hashes: ${HASHES:-unknown}"
          } > benchmark-summary.md
          cat benchmark-summary.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.summary_name }}
          path: |
            benchmark-results.txt
            benchmark-summary.md
          retention-days: 30
